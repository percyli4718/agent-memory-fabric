name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: amf_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build asyncpg

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short

      - name: Validate JSON schemas
        run: |
          python -c "from agent_memory_fabric.schema_loader import load_schema; [load_schema(f) for f in ['search-memory.request.schema.json', 'write-memory.request.schema.json', 'upsert-fact.request.schema.json', 'list-memories-by-repo.request.schema.json', 'get-recent-project-context.request.schema.json', 'get-decisions.request.schema.json', 'get-open-questions.request.schema.json', 'redact-memory.request.schema.json']]"

      - name: Verify package build
        run: |
          python -m build
